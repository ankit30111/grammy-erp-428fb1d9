  aside label { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; user-select: none; font-size: 12px; }

  .group-list { max-height: 260px; overflow-y: auto; padding-right: 4px; }
  .group-list::-webkit-scrollbar { width: 6px; }
  .group-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  .group-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; cursor: pointer; user-select: none; font-size: 11px; }
  .group-row .swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .group-row .count { color: #8b949e; margin-left: auto; }
  .group-row.muted { opacity: 0.35; }
  .stats { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 12px; font-size: 11px; color: #8b949e; }
  .stats div { display: flex; justify-content: space-between; padding: 2px 0; }
  .stats div span:last-child { color: #e6edf3; font-variant-numeric: tabular-nums; }
  #info { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 12px; font-size: 11px; min-height: 50px; }
  #info .filename { font-weight: 600; color: #58a6ff; word-break: break-all; }
  #info .meta { color: #8b949e; margin-top: 4px; }
  #info .neighbors { margin-top: 8px; font-size: 11px; }
  #info .neighbors .label { color: #8b949e; text-transform: uppercase; letter-spacing: 0.06em; font-size: 9px; margin-top: 6px; }
  #info .neighbors a { display: block; color: #79c0ff; cursor: pointer; padding: 1px 0; word-break: break-all; }
  #info .neighbors a:hover { color: #a5d6ff; text-decoration: underline; }
  main { position: relative; overflow: hidden; }
  svg { display: block; width: 100%; height: 100%; cursor: grab; background: radial-gradient(ellipse at center, #161b22 0%, #0e1117 100%); }
  svg:active { cursor: grabbing; }
  .link { stroke: #30363d; stroke-opacity: 0.4; }
  .link.highlighted { stroke: #58a6ff; stroke-opacity: 0.9; }
  .link.dim { stroke-opacity: 0.05; }
  .node { cursor: pointer; stroke: #0e1117; stroke-width: 1; }
  .node.dim { opacity: 0.15; }
  .node.highlighted { stroke: #ffffff; stroke-width: 2; }
  .label { fill: #e6edf3; font-size: 10px; pointer-events: none; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
  .label.dim { opacity: 0.15; }
  .legend-toggle { position: absolute; top: 12px; right: 12px; background: #161b22; border: 1px solid #30363d; padding: 6px 10px; border-radius: 6px; font-size: 11px; color: #8b949e; }

const palette = ["#58a6ff","#3fb950","#f78166","#bc8cff","#ffa657","#79c0ff","#56d364","#ff7b72","#d2a8ff","#ffdfb6","#39c5cf","#a5f3a7","#ff9492","#e6b3ff","#ffb1ff","#7ee787","#fab387","#94e2d5","#f5c2e7","#cba6f7","#74c7ec","#a6e3a1","#f9e2af","#fab387","#eba0ac","#cdd6f4","#f38ba8","#94e2d5","#89b4fa","#fabf2c","#a6adc8","#bac2de","#7c7f93","#9399b2","#11111b","#181825","#1e1e2e","#313244"];
const groups = [...new Set(DATA.nodes.map(n => n.group))].sort();
const groupColor = Object.fromEntries(groups.map((g, i) => [g, palette[i % palette.length]]));
const UI_GROUP = "components/ui";

const nodeById = Object.fromEntries(DATA.nodes.map(n => [n.id, n]));

const svg = d3.select("svg");
const g = svg.append("g");
const linkLayer = g.append("g").attr("class", "links");
const nodeLayer = g.append("g").attr("class", "nodes");
const labelLayer = g.append("g").attr("class", "labels");

let width = window.innerWidth - 280;
let height = window.innerHeight;
svg.attr("viewBox", [0, 0, width, height]);

const zoom = d3.zoom().scaleExtent([0.1, 8]).on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);

let activeGroups = new Set(groups);
let hideUI = true;
let hideHooks = false;
let showLabels = true;
let searchTerm = "";
let selected = null;

function visibleNodes() {
  return DATA.nodes.filter(n => {
    if (!activeGroups.has(n.group)) return false;
    if (hideUI && n.group === UI_GROUP) return false;
    if (hideHooks && n.group === "hooks") return false;
    return true;
  });
}

function visibleLinks(nodes) {
  const ids = new Set(nodes.map(n => n.id));
  return DATA.links.filter(l => ids.has(typeof l.source === 'string' ? l.source : l.source.id) && ids.has(typeof l.target === 'string' ? l.target : l.target.id));
}

let simulation = null;
let nodeSel, linkSel, labelSel;

function radius(n) { return Math.max(4, Math.min(18, 4 + Math.sqrt(n.in) * 2)); }

function render() {
  const nodes = visibleNodes().map(n => Object.assign({}, n));  // fresh copy each render
  const links = visibleLinks(nodes).map(l => Object.assign({}, l));

  // Reset selection if hidden
  if (selected && !nodes.find(n => n.id === selected)) selected = null;

  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(35).strength(0.4))
    .force("charge", d3.forceManyBody().strength(-80))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collide", d3.forceCollide(d => radius(d) + 2))
    .force("x", d3.forceX(width / 2).strength(0.02))
    .force("y", d3.forceY(height / 2).strength(0.02));

  linkSel = linkLayer.selectAll("line").data(links, d => `${d.source}->${d.target}`)
    .join("line").attr("class", "link").attr("stroke-width", 0.6);

  nodeSel = nodeLayer.selectAll("circle").data(nodes, d => d.id)
    .join("circle")
    .attr("class", "node")
    .attr("r", d => radius(d))
    .attr("fill", d => groupColor[d.group])
    .on("click", (e, d) => { e.stopPropagation(); select(d.id); })
    .on("mouseenter", (e, d) => showInfo(d.id, true))
    .on("mouseleave", () => { if (selected) showInfo(selected); else clearInfo(); })
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  labelSel = labelLayer.selectAll("text").data(nodes.filter(n => showLabels && (n.in >= 8 || n.out >= 10)), d => d.id)
    .join("text").attr("class", "label").text(d => d.name).attr("dx", 8).attr("dy", 3);

  simulation.on("tick", () => {
    linkSel.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeSel.attr("cx", d => d.x).attr("cy", d => d.y);
    labelSel.attr("x", d => d.x).attr("y", d => d.y);
  });

  applyHighlight();
}

function neighbors(id) {
  const ins = new Set(), outs = new Set();
  DATA.links.forEach(l => {
    const s = typeof l.source === 'string' ? l.source : l.source.id;
    const t = typeof l.target === 'string' ? l.target : l.target.id;
    if (s === id) outs.add(t);
    if (t === id) ins.add(s);
  });
  return { ins, outs };
}

function applyHighlight() {
  if (!nodeSel) return;
  const term = searchTerm.toLowerCase();
  let highlightSet = null, dimAll = false;
  if (selected) {
    const { ins, outs } = neighbors(selected);
    highlightSet = new Set([selected, ...ins, ...outs]);
    dimAll = true;
  } else if (term) {
    highlightSet = new Set(DATA.nodes.filter(n => n.id.toLowerCase().includes(term)).map(n => n.id));
    dimAll = highlightSet.size > 0;
  }
  nodeSel.classed("highlighted", d => highlightSet?.has(d.id))
         .classed("dim", d => dimAll && !highlightSet?.has(d.id));
  labelSel?.classed("dim", d => dimAll && !highlightSet?.has(d.id));
  linkSel.classed("highlighted", d => {
            if (!selected) return false;
            const s = typeof d.source === 'string' ? d.source : d.source.id;
            const t = typeof d.target === 'string' ? d.target : d.target.id;
            return s === selected || t === selected;
          })
          .classed("dim", d => {
            if (!dimAll) return false;
            const s = typeof d.source === 'string' ? d.source : d.source.id;
            const t = typeof d.target === 'string' ? d.target : d.target.id;
            return !(highlightSet.has(s) && highlightSet.has(t));
          });
}

function select(id) {
  selected = id;
  showInfo(id);
  applyHighlight();
}

function showInfo(id, transient = false) {
  const n = nodeById[id]; if (!n) return;
  const { ins, outs } = neighbors(id);
  const list = (set, max = 30) => {
    const arr = [...set].sort();
    const shown = arr.slice(0, max).map(i => `<a data-id="${i}">${i}</a>`).join('');
    const more = arr.length > max ? `<div class="meta">+${arr.length - max} more…</div>` : '';
    return shown + more || '<div class="meta">(none)</div>';
  };
  document.getElementById("info").innerHTML = `
    <div class="filename">${n.id}</div>
    <div class="meta">module: ${n.group} · ${n.in} imports in · ${n.out} imports out</div>
    <div class="neighbors">
      <div class="label">Imported by (${ins.size})</div>${list(ins)}
      <div class="label">Imports (${outs.size})</div>${list(outs)}
    </div>`;
  document.querySelectorAll('#info a').forEach(a => a.addEventListener('click', () => select(a.dataset.id)));
}

function clearInfo() { document.getElementById("info").innerHTML = "Click any node to inspect."; }

function renderGroups() {
  const counts = {};
  DATA.nodes.forEach(n => counts[n.group] = (counts[n.group] || 0) + 1);
  document.getElementById("groups").innerHTML = groups.map(g => `
    <div class="group-row" data-group="${g}">
      <div class="swatch" style="background:${groupColor[g]}"></div>
      <div>${g}</div>
      <div class="count">${counts[g]}</div>
    </div>`).join('');
  document.querySelectorAll('.group-row').forEach(row => {
    row.addEventListener('click', () => {
      const g = row.dataset.group;
      if (activeGroups.has(g)) activeGroups.delete(g); else activeGroups.add(g);
      row.classList.toggle('muted', !activeGroups.has(g));
      render();
    });
  });
}

function renderStats() {
  document.getElementById("stats").innerHTML = `
    <div><span>Files</span><span>${DATA.stats.total_files}</span></div>
    <div><span>Imports</span><span>${DATA.stats.total_links}</span></div>
    <div><span>Modules</span><span>${groups.length}</span></div>`;
}

document.getElementById("search").addEventListener("input", e => { searchTerm = e.target.value; selected = null; applyHighlight(); });
document.getElementById("hideUI").addEventListener("change", e => { hideUI = e.target.checked; render(); });
document.getElementById("hideHooks").addEventListener("change", e => { hideHooks = e.target.checked; render(); });
document.getElementById("showLabels").addEventListener("change", e => { showLabels = e.target.checked; render(); });
svg.on("click", () => { selected = null; applyHighlight(); clearInfo(); });
window.addEventListener("resize", () => {
  width = window.innerWidth - 280; height = window.innerHeight;
  svg.attr("viewBox", [0, 0, width, height]);
});
window.addEventListener("keydown", e => { if (e.key === 'Escape') { selected = null; applyHighlight(); clearInfo(); } });

renderGroups(); renderStats(); render();
</script>
</body>
</html>
